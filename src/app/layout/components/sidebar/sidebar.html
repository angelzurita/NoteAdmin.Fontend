<aside
  class="flex flex-col bg-gray-900 text-white transition-all duration-300"
  [class]="collapsed() ? 'w-16' : 'w-64'"
>
  <!-- Logo -->
  <div class="flex h-16 items-center justify-between border-b border-gray-700 px-4">
    @if (!collapsed()) {
      <span class="text-lg font-bold tracking-tight">NotesAdmin</span>
    }
    <button
      class="rounded p-1 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors"
      (click)="toggleCollapse()"
      [attr.aria-label]="collapsed() ? 'Expandir menú' : 'Colapsar menú'"
    >
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </button>
  </div>

  <!-- Navigation -->
  <nav class="flex-1 space-y-1 px-2 py-4" aria-label="Navegación principal">
    @for (item of navItems; track item.route) {
      <a
        [routerLink]="item.route"
        routerLinkActive="bg-gray-800 text-white"
        class="flex items-center gap-3 rounded-lg px-3 py-2 text-sm text-gray-300 hover:bg-gray-800 hover:text-white transition-colors"
        [attr.title]="collapsed() ? item.label : null"
      >
        <svg class="h-5 w-5 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" [attr.d]="item.icon" />
        </svg>
        @if (!collapsed()) {
          <span>{{ item.label }}</span>
        }
      </a>
    }
  </nav>

  <!-- User / Logout -->
  <div class="border-t border-gray-700 p-3">
    <div class="flex items-center gap-3">
      <div class="flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-indigo-600 text-sm font-bold">
        {{ userInitial() }}
      </div>
      @if (!collapsed()) {
        <div class="flex-1 overflow-hidden">
          <p class="truncate text-sm font-medium">{{ user()?.name }}</p>
          <p class="truncate text-xs text-gray-400">{{ user()?.email }}</p>
        </div>
        <button
          class="rounded p-1 text-gray-400 hover:bg-gray-800 hover:text-white transition-colors"
          (click)="logout()"
          aria-label="Cerrar sesión"
        >
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a2 2 0 01-2 2H6a2 2 0 01-2-2V7a2 2 0 012-2h5a2 2 0 012 2v1" />
          </svg>
        </button>
      }
    </div>
  </div>
</aside>
